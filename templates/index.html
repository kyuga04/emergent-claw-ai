<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergent-Claw AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-6">
        <div class="text-2xl font-bold mb-10 flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-sm">E</div>
            Emergent<span>Claw</span>
        </div>
        
        <nav class="flex-1 space-y-4">
            <p class="text-xs font-semibold text-slate-500 uppercase">AI Personas</p>
            <button onclick="setSystem('coder')" class="w-full text-left p-2 hover:bg-slate-800 rounded transition">💻 Asisten Kode</button>
            <button onclick="setSystem('crypto')" class="w-full text-left p-2 hover:bg-slate-800 rounded transition">📈 Analis Crypto</button>
            <button onclick="setSystem('video')" class="w-full text-left p-2 hover:bg-slate-800 rounded transition">🎬 Skenario Video</button>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800 text-xs text-slate-500">
            Connected to Emergent LLM API
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col relative">
        <!-- Header -->
        <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
            <span id="current-persona" class="text-indigo-400 font-semibold">Standard Assistant</span>
            <button class="text-xs bg-slate-800 px-3 py-1 rounded hover:bg-slate-700">Settings</button>
        </header>

        <!-- Messages -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-6 custom-scroll">
            <div class="max-w-3xl mx-auto flex gap-4">
                <div class="w-8 h-8 rounded bg-indigo-600 flex-shrink-0 flex items-center justify-center text-xs">AI</div>
                <div class="space-y-2">
                    <p class="text-slate-300">Selamat datang di Emergent-Claw. Anda ingin saya membantu dalam hal apa hari ini?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-gradient-to-t from-slate-900 via-slate-900 to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <textarea id="user-input" rows="1" placeholder="Tanyakan apa saja..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 pr-16 focus:outline-none focus:ring-2 focus:ring-indigo-600 resize-none custom-scroll"></textarea>
                <button onclick="sendMsg()" class="absolute right-3 bottom-3 bg-indigo-600 p-2 rounded-lg hover:bg-indigo-500 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-600 mt-2">Powered by Emergent AI & your coding skills.</p>
        </div>
    </main>

    <script>
        let currentSystem = "Anda adalah asisten AI yang cerdas.";
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        function setSystem(type) {
            if(type === 'coder') currentSystem = "Anda adalah ahli pemrograman senior. Berikan solusi kode yang bersih dan efektif.";
            if(type === 'crypto') currentSystem = "Anda adalah analis pasar crypto profesional. Berikan insight data dan sentimen pasar.";
            if(type === 'video') currentSystem = "Anda adalah sutradara video AI. Bantu buatkan naskah dan prompt video AI.";
            document.getElementById('current-persona').innerText = type.charAt(0).toUpperCase() + type.slice(1) + " Expert";
        }

        async function sendMsg() {
            const msg = input.value.trim();
            if(!msg) return;

            // User UI
            appendMsg('user', msg);
            input.value = '';

            // Loading AI
            const loadingId = 'ai-' + Date.now();
            appendMsg('ai', 'Sedang memproses...', loadingId);

            try {
                const res = await fetch('/api/ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, system: currentSystem })
                });
                const data = await res.json();
                document.getElementById(loadingId).querySelector('.content').innerText = data.result || data.error;
            } catch (e) {
                document.getElementById(loadingId).querySelector('.content').innerText = "Koneksi Error.";
            }
        }

        function appendMsg(sender, text, id = '') {
            const wrapper = document.createElement('div');
            wrapper.className = "max-w-3xl mx-auto flex gap-4 animate-fade-in";
            if(id) wrapper.id = id;

            const icon = sender === 'ai' ? 'AI' : 'ME';
            const color = sender === 'ai' ? 'bg-indigo-600' : 'bg-slate-700';

            wrapper.innerHTML = `
                <div class="w-8 h-8 rounded ${color} flex-shrink-0 flex items-center justify-center text-[10px] font-bold">${icon}</div>
                <div class="space-y-2">
                    <p class="text-slate-300 content">${text}</p>
                </div>
            `;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
